<body>
<div id="app"></div>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// STORAGE — triple persist (localStorage + sessionStorage + cookie)
// ══════════════════════════════════════════════════════════════
const K_FIN='or_fh_k', K_ANT='or_ant_k', K_TRADES='or_tv3', K_TICKERS='or_tickers_v1';

function setCookie(n,v,days){
  const e=new Date(Date.now()+days*864e5).toUTCString();
  document.cookie=n+'='+encodeURIComponent(v)+';expires='+e+';path=/;SameSite=Lax';
}
function getCookie(n){
  const m=document.cookie.match('(?:^|; )'+n+'=([^;]*)');
  return m?decodeURIComponent(m[1]):null;
}
function readKey(n){return localStorage.getItem(n)||sessionStorage.getItem(n)||getCookie(n)||'';}
function writeKey(n,v){
  try{localStorage.setItem(n,v);}catch(e){}
  try{sessionStorage.setItem(n,v);}catch(e){}
  setCookie(n,v,365*7);
}
function deleteKey(n){
  try{localStorage.removeItem(n);}catch(e){}
  try{sessionStorage.removeItem(n);}catch(e){}
  document.cookie=n+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
}

// ══════════════════════════════════════════════════════════════
// DYNAMIC TICKERS — stored in localStorage, default to 3 ETFs
// ══════════════════════════════════════════════════════════════
const COLOR_POOL=['#1e40af','#7c3aed','#0f766e','#b45309','#be123c',
                  '#0369a1','#4d7c0f','#7e22ce','#c2410c','#0e7490'];
function getColor(sym){
  const i=S.tickers.indexOf(sym);
  return i>=0?COLOR_POOL[i%COLOR_POOL.length]:'#64748b';
}
function loadTickers(){
  try{const t=JSON.parse(readKey(K_TICKERS)||'null');
    if(Array.isArray(t)&&t.length>0) return t;}catch(e){}
  return ['TSLL','SOXL','TQQQ'];
}
function saveTickers(arr){writeKey(K_TICKERS,JSON.stringify(arr));}

// ══════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════
const VIX_LIMIT=25, MOVE_PCT=5;
const EVENTS=[
  {d:'2026-04-09',e:'CPI Report',t:'CPI'},
  {d:'2026-04-29',e:'FOMC Meeting',t:'FED'},
  {d:'2026-04-30',e:'Fed Rate Decision',t:'RATE'},
  {d:'2026-05-07',e:'CPI Report',t:'CPI'},
  {d:'2026-06-09',e:'FOMC Meeting',t:'FED'},
  {d:'2026-06-10',e:'Fed Rate Decision',t:'RATE'},
  {d:'2026-07-09',e:'CPI Report',t:'CPI'},
  {d:'2026-07-28',e:'FOMC Meeting',t:'FED'},
  {d:'2026-07-29',e:'Fed Rate Decision',t:'RATE'},
  {d:'2026-09-15',e:'FOMC Meeting',t:'FED'},
  {d:'2026-09-16',e:'Fed Rate Decision',t:'RATE'},
  {d:'2026-11-04',e:'FOMC Meeting',t:'FED'},
  {d:'2026-11-05',e:'Fed Rate Decision',t:'RATE'},
];
const ECOL={FED:'#f59e0b',RATE:'#ef4444',CPI:'#7c3aed'};

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const _fk=readKey(K_FIN), _ak=readKey(K_ANT);
if(_fk) writeKey(K_FIN,_fk);
if(_ak) writeKey(K_ANT,_ak);
const _initTickers=loadTickers();

const S={
  screen: _fk?'app':'setup',
  setupStep:1,
  finnhubKey:_fk, anthropicKey:_ak,
  tab:'dashboard',
  loading:false, dataError:null, lastUpdated:null,
  marketData:{}, vix:null, vixError:false,
  aiText:'', aiLoading:false,
  history:[],
  inp:'', inpErr:'', inpBusy:false,
  chartTicker:_initTickers[0]||'TSLL',
  chartData:{}, chartLoading:false, chartError:null,
  trades: (()=>{try{return JSON.parse(readKey(K_TRADES)||'[]');}catch(e){return[];}})(),
  decisions:{},
  rateMsg:null,
  // Dynamic ticker list
  tickers:[..._initTickers],
  tickerInp:'', tickerErr:'', tickerBusy:false,
};

function set(p){Object.assign(S,p);render();}
function saveTrades(){writeKey(K_TRADES,JSON.stringify(S.trades));}

// ══════════════════════════════════════════════════════════════
// RATE LIMITER — Finnhub free = 60 req/min
// Queue with 1.1s minimum spacing → max ~54/min, safe under 60
// ══════════════════════════════════════════════════════════════
const reqQ=[];let reqRunning=false;
async function rateLimitedFetch(url){
  return new Promise((res,rej)=>{
    reqQ.push({url,res,rej});
    if(!reqRunning) drainQ();
  });
}
async function drainQ(){
  reqRunning=true;
  while(reqQ.length){
    const {url,res,rej}=reqQ.shift();
    try{
      const r=await fetch(url);
      if(r.status===429){
        // Rate limited — pause 10s and retry
        set({rateMsg:'Rate limit — pausing 10s…'});
        await sleep(10000);
        set({rateMsg:null});
        reqQ.unshift({url,res,rej});
        continue;
      }
      res(r);
    }catch(e){rej(e);}
    // 1.1s between requests = ~54/min safely under 60 limit
    if(reqQ.length) await sleep(1100);
  }
  reqRunning=false;
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const todayStr=()=>new Date().toISOString().split('T')[0];
const todayEvents=()=>EVENTS.filter(e=>e.d===todayStr());
const upcomingEvents=()=>EVENTS.filter(e=>e.d>todayStr()).slice(0,6);
const hasRisk=()=>todayEvents().length>0;
const vixHigh=()=>S.vix&&parseFloat(S.vix)>=VIX_LIMIT;
const tradeable=()=>!vixHigh()&&!hasRisk();
function sig(c){
  const v=parseFloat(c);
  if(isNaN(v)||vixHigh()||hasRisk()) return{type:'NO_TRADE',label:'NO TRADE',cls:'badge-notrade',callOk:false,putOk:false};
  if(v>=MOVE_PCT)  return{type:'SELL_CALL',label:'SELL CALL',cls:'badge-call',callOk:true,putOk:false};
  if(v<=-MOVE_PCT) return{type:'SELL_PUT', label:'SELL PUT', cls:'badge-put', callOk:false,putOk:true};
  return{type:'WAIT',label:'WAIT',cls:'badge-wait',callOk:false,putOk:false};
}
function strikePx(p,pct){return parseFloat((parseFloat(p)*(1+pct/100)).toFixed(2));}
function fmtVol(v){if(!v)return'—';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return''+v;}
function fmtDate(d){if(!d)return'—';return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
function daysUntil(d){return Math.max(0,Math.ceil((d-Date.now())/(24*3600*1000)));}
function nextExpiry(dte){
  dte=dte||30;
  const target=new Date(Date.now()+dte*24*3600*1000);
  function thirdFri(y,m){
    let fri=0;
    for(let day=1;day<=31;day++){
      const dt=new Date(y,m,day);
      if(dt.getMonth()!==m) break;
      if(dt.getDay()===5&&++fri===3) return dt;
    }
  }
  let e=thirdFri(target.getFullYear(),target.getMonth());
  if(!e||e<new Date()) e=thirdFri(target.getFullYear(),target.getMonth()+1);
  return e;
}

// ══════════════════════════════════════════════════════════════
// FINNHUB API
// ══════════════════════════════════════════════════════════════
async function fhQuote(sym){
  const r=await rateLimitedFetch(
    'https://finnhub.io/api/v1/quote?symbol='+encodeURIComponent(sym)+'&token='+S.finnhubKey);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  if(!d.c||d.c===0) throw new Error('No price for '+sym+' — invalid ticker?');
  return d;
}

// VIX via Finnhub (same key, same rate-limited queue)
async function fetchVIX(){
  try{
    const r=await rateLimitedFetch(
      'https://finnhub.io/api/v1/quote?symbol=%5EVIX&token='+S.finnhubKey);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.c&&d.c>0) return parseFloat(d.c).toFixed(2);
  }catch(e){}
  return null;
}

// Candles via Yahoo Finance (no Finnhub quota used)
async function fetchWithTimeout(url,ms){
  ms=ms||9000;
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(tid);return r;}
  catch(e){clearTimeout(tid);throw e;}
}
function parseYahoo(raw){
  const d=typeof raw==='string'?JSON.parse(raw):raw;
  const res=d.chart.result[0];
  const ts=res.timestamp, q=res.indicators.quote[0];
  if(!ts||!q.close) throw new Error('empty Yahoo data');
  return ts.map((t,i)=>({
    t:t*1000,
    o:q.open[i]||q.close[i]||0,
    h:q.high[i]||q.close[i]||0,
    l:q.low[i]||q.close[i]||0,
    c:q.close[i],
    v:q.volume[i]||0
  })).filter(c=>c.c!=null&&c.c>0&&!isNaN(c.c));
}
async function fhCandles(sym){
  const yUrl='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=40d';
  const proxies=[
    'https://corsproxy.io/?url='+encodeURIComponent(yUrl),
    'https://api.allorigins.win/get?url='+encodeURIComponent(yUrl),
  ];
  let lastErr='no attempt';
  for(const proxy of proxies){
    try{
      const r=await fetchWithTimeout(proxy,9000);
      if(!r.ok) throw new Error('HTTP '+r.status);
      const j=await r.json();
      const raw=j.contents!==undefined?j.contents:j;
      const data=parseYahoo(raw);
      if(data.length>=5) return data;
      throw new Error('only '+data.length+' rows');
    }catch(e){lastErr=e.message;}
  }
  throw new Error('Chart data unavailable: '+lastErr);
}

// ══════════════════════════════════════════════════════════════
// REALIZED VOLATILITY — from 30-day candle log-returns
// ══════════════════════════════════════════════════════════════
function calcRV(candles){
  if(!candles||candles.length<5) return null;
  const cl=candles.map(c=>c.c);
  const lr=[];
  for(let i=1;i<cl.length;i++)
    if(cl[i]>0&&cl[i-1]>0) lr.push(Math.log(cl[i]/cl[i-1]));
  if(lr.length<2) return null;
  const mean=lr.reduce((a,b)=>a+b,0)/lr.length;
  const v=lr.reduce((s,r)=>s+Math.pow(r-mean,2),0)/lr.length;
  return (Math.sqrt(v)*Math.sqrt(252)*100).toFixed(0);
}

// ══════════════════════════════════════════════════════════════
// OPTIONS PRICING — Black-Scholes approximation
// ══════════════════════════════════════════════════════════════
function estimateOptions(price,callStrike,putStrike,dte,rv){
  const iv=rv&&!isNaN(parseFloat(rv))?parseFloat(rv)/100:0.85;
  const t=Math.max(dte,1)/365;
  const sqrtT=Math.sqrt(t);
  const callFactor=Math.exp(-Math.pow(Math.log(callStrike/price),2)/(2*iv*iv*t));
  const putFactor =Math.exp(-Math.pow(Math.log(putStrike/price),2)/(2*iv*iv*t));
  const atm=iv*sqrtT*price*0.3989;
  const cMid=Math.max(0.01,atm*callFactor);
  const pMid=Math.max(0.01,atm*putFactor);
  const spread=Math.max(0.02,cMid*0.12);
  return{
    callBid:(cMid-spread/2).toFixed(2), callAsk:(cMid+spread/2).toFixed(2),
    callMid:cMid.toFixed(2), callPct:((cMid/price)*100).toFixed(1),
    putBid:(pMid-spread/2).toFixed(2),  putAsk:(pMid+spread/2).toFixed(2),
    putMid:pMid.toFixed(2),  putPct:((pMid/price)*100).toFixed(1),
    rvUsed:(iv*100).toFixed(0),
  };
}

// ══════════════════════════════════════════════════════════════
// MARKET LOAD
// API budget per full refresh:
//   Quotes: N tickers × 1 call each, 1.1s apart via rate limiter
//   VIX:    1 call via rate limiter (same queue)
//   Candles: 1 per ticker via Yahoo (NO Finnhub quota) — cached per session
//   Total Finnhub calls: N+1 per refresh (e.g. 4 tickers = 5 calls)
//   At 5 min refresh interval: well under 60/min limit
// ══════════════════════════════════════════════════════════════
let _loading=false;
async function loadMarket(){
  if(_loading) return;
  _loading=true;
  set({loading:true,dataError:null,vixError:false,rateMsg:null});
  try{
    // Step 1: Quotes for all tracked tickers (rate-limited queue handles spacing)
    const md={};
    for(const t of S.tickers){
      set({rateMsg:'Fetching '+t+'…'});
      const q=await fhQuote(t);
      const chg=q.dp!=null?parseFloat(q.dp).toFixed(2):(((q.c-q.pc)/q.pc)*100).toFixed(2);
      const existingRV=S.marketData[t]?.iv||null;
      md[t]={
        price:parseFloat(q.c).toFixed(2), chg,
        prev:parseFloat(q.pc).toFixed(2),
        vol:q.v||0, high:q.h, low:q.l,
        iv:existingRV, ivLoading:!existingRV
      };
    }
    set({marketData:md, loading:false, lastUpdated:new Date().toLocaleTimeString(), rateMsg:null});

    // Step 2: VIX (1 more Finnhub call, also rate-limited)
    set({rateMsg:'Fetching VIX…'});
    const vix=await fetchVIX();
    set({vix, vixError:!vix, rateMsg:null});

    // Step 3: Candles via Yahoo (no Finnhub quota) — cached per session
    // Compute RV from candles immediately after fetching
    for(const t of S.tickers){
      if(S.chartData[t]){
        // Already cached — just recompute RV if missing
        if(!S.marketData[t]?.iv){
          const rv=calcRV(S.chartData[t]);
          S.marketData={...S.marketData,[t]:{...S.marketData[t],iv:rv,ivLoading:false}};
        }
        continue;
      }
      set({rateMsg:'Loading '+t+' chart…'});
      try{
        const candles=await fhCandles(t);
        const rv=calcRV(candles);
        S.chartData={...S.chartData,[t]:candles};
        S.marketData={...S.marketData,[t]:{...S.marketData[t],iv:rv,ivLoading:false}};
      }catch(e){
        S.marketData={...S.marketData,[t]:{...S.marketData[t],iv:null,ivLoading:false}};
      }
    }
    set({rateMsg:null});

    // Step 4: Refresh open trade P&L with latest prices
    refreshTradePrices();

  }catch(e){
    set({loading:false, dataError:e.message, rateMsg:null});
  }
  _loading=false;
}

async function loadChart(ticker){
  set({chartLoading:true,chartError:null,chartTicker:ticker,tab:'chart'});
  if(S.chartData[ticker]){set({chartLoading:false});return;}
  try{
    const candles=await fhCandles(ticker);
    S.chartData={...S.chartData,[ticker]:candles};
    const rv=calcRV(candles);
    if(S.marketData[ticker])
      S.marketData={...S.marketData,[ticker]:{...S.marketData[ticker],iv:rv,ivLoading:false}};
    set({chartLoading:false});
  }catch(e){set({chartLoading:false,chartError:e.message});}
}

// ══════════════════════════════════════════════════════════════
// TICKER MANAGEMENT
// ══════════════════════════════════════════════════════════════
async function addTicker(){
  const sym=(S.tickerInp||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(!sym){set({tickerErr:'Enter a ticker symbol'});return;}
  if(sym.length>6){set({tickerErr:'Max 6 characters'});return;}
  if(S.tickers.includes(sym)){set({tickerErr:sym+' is already being tracked'});return;}
  set({tickerBusy:true,tickerErr:''});
  try{
    // Verify ticker exists on Finnhub — uses 1 rate-limited call
    set({rateMsg:'Verifying '+sym+'…'});
    const q=await fhQuote(sym);
    if(!q.c||q.c===0) throw new Error('No price data for '+sym);
    const newTickers=[...S.tickers,sym];
    saveTickers(newTickers);
    const newMd={...S.marketData};
    newMd[sym]={
      price:parseFloat(q.c).toFixed(2),
      chg:q.dp!=null?parseFloat(q.dp).toFixed(2):(((q.c-q.pc)/q.pc)*100).toFixed(2),
      prev:parseFloat(q.pc).toFixed(2),
      vol:q.v||0, high:q.h, low:q.l,
      iv:null, ivLoading:true
    };
    set({tickers:newTickers, marketData:newMd,
      tickerInp:'', tickerErr:'', tickerBusy:false, rateMsg:null});
    // Fetch candles + RV for new ticker (Yahoo, no Finnhub quota)
    fhCandles(sym).then(candles=>{
      const rv=calcRV(candles);
      S.chartData={...S.chartData,[sym]:candles};
      S.marketData={...S.marketData,[sym]:{...S.marketData[sym],iv:rv,ivLoading:false}};
      set({});
    }).catch(()=>{
      S.marketData={...S.marketData,[sym]:{...S.marketData[sym],iv:null,ivLoading:false}};
      set({});
    });
  }catch(e){
    set({tickerBusy:false, tickerErr:e.message, rateMsg:null});
  }
}

function removeTicker(sym){
  if(S.tickers.length<=1){set({tickerErr:'Must keep at least one ticker'});return;}
  const newTickers=S.tickers.filter(t=>t!==sym);
  saveTickers(newTickers);
  // Clean up market data for removed ticker (trades for it remain tracked)
  const newDecisions={...S.decisions}; delete newDecisions[sym];
  const newMd={...S.marketData}; delete newMd[sym];
  set({
    tickers:newTickers, decisions:newDecisions, marketData:newMd,
    chartTicker:newTickers.includes(S.chartTicker)?S.chartTicker:newTickers[0],
    tickerErr:''
  });
}

function addTrade(ticker,type){
  const d=S.marketData[ticker]; if(!d) return;
  const price=parseFloat(d.price);
  const expiry=nextExpiry(30), dte=daysUntil(expiry);
  const callStrike=strikePx(price,10), putStrike=strikePx(price,-10);
  const strike=type==='call'?callStrike:putStrike;
  const opts=estimateOptions(price,callStrike,putStrike,dte,d.iv);
  const entryPremium=parseFloat(type==='call'?opts.callMid:opts.putMid);
  const now=new Date();
  const trade={
    id:Date.now(), ticker, type,
    entryDate:now.toLocaleDateString(),
    entryPrice:price, strike,
    expiry:fmtDate(expiry), expiryDate:expiry.toISOString(), dte,
    entryPremium,
    entryBid:parseFloat(type==='call'?opts.callBid:opts.putBid),
    entryAsk:parseFloat(type==='call'?opts.callAsk:opts.putAsk),
    currentPremium:entryPremium,
    currentBid:parseFloat(type==='call'?opts.callBid:opts.putBid),
    currentAsk:parseFloat(type==='call'?opts.callAsk:opts.putAsk),
    profitPct:0, status:'open',
    lastUpdated:now.toLocaleTimeString(),
  };
  const trades=[...S.trades,trade];
  saveTrades();
  set({trades,decisions:{...S.decisions,[ticker]:null}});
}

function closeTrade(id){
  const now=new Date();
  const trades=S.trades.map(t=>{
    if(t.id!==id) return t;
    const entry=new Date(t.entryDate);
    const daysActive=Math.max(1,Math.ceil((now-entry)/(24*3600*1000)));
    const pf=parseFloat(t.profitPct)||0;
    return{...t, status:'closed', closedDate:now.toLocaleDateString(),
      daysActive, finalPnl:pf, outcome:pf>=50?'WIN':'EXIT'};
  });
  S.trades=trades; saveTrades(); render();
}

function refreshTradePrices(){
  const open=S.trades.filter(t=>t.status==='open');
  if(!open.length) return;
  open.forEach(trade=>{
    const d=S.marketData[trade.ticker]; if(!d) return;
    const price=parseFloat(d.price);
    const expiry=new Date(trade.expiryDate), dte=daysUntil(expiry);
    const callStrike=trade.type==='call'?trade.strike:price*1.10;
    const putStrike=trade.type==='put'?trade.strike:price*0.90;
    const opts=estimateOptions(price,callStrike,putStrike,dte,d.iv);
    const curPrem=parseFloat(trade.type==='call'?opts.callMid:opts.putMid);
    const pnl=((trade.entryPremium-curPrem)/trade.entryPremium*100);
    const status=pnl>=50?'target_hit':dte<=0?'expired':'open';
    Object.assign(trade,{
      currentPremium:curPrem,
      currentBid:parseFloat(trade.type==='call'?opts.callBid:opts.putBid),
      currentAsk:parseFloat(trade.type==='call'?opts.callAsk:opts.putAsk),
      profitPct:pnl.toFixed(1), status,
      lastUpdated:new Date().toLocaleTimeString()
    });
  });
  saveTrades(); render();
}

function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  if(attrs) for(const[k,v] of Object.entries(attrs)){
    if(k==='cls') e.className=v;
    else if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids){
    if(c==null||c===false) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}
const D=(cls,...k)=>el('div',{cls},...k);

  if(S.tab==='settings')  body.appendChild(renderSettings());
  wrap.appendChild(body);
  return wrap;
}

// DASHBOARD
// ══════════════════════════════════════════════════════════════
function renderDashboard(te){
  const w=el('div',{cls:'fade'});

  // VIX + Status row
  const top=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'12px'}});
  const vv=S.vix?parseFloat(S.vix):null;
  const vcol=S.vixError?'#94a3b8':!vv?'#94a3b8':vv>=VIX_LIMIT?'#dc2626':vv>20?'#d97706':'#059669';
  const vc=el('div',{cls:'card',style:{marginBottom:'0'}});
  vc.appendChild(el('div',{cls:'card-label'},'VIX Index'));
  vc.appendChild(el('div',{style:{fontSize:'30px',fontWeight:'800',color:vcol,lineHeight:'1',marginBottom:'3px'}},
    S.vixError?'N/A':(S.vix||'—')));
  vc.appendChild(el('div',{style:{fontSize:'11px',fontWeight:'700',color:vcol}},
    S.vixError?'⚠ Unavailable':!vv?'Loading…':vv>=VIX_LIMIT?'⛔ HIGH — NO TRADES':vv>20?'⚡ Elevated':'✓ Normal'));
  top.appendChild(vc);
  const sc=el('div',{cls:'card',style:{marginBottom:'0'}});
  sc.appendChild(el('div',{cls:'card-label'},'Today'));
  sc.appendChild(el('div',{style:{fontSize:'16px',fontWeight:'800',
        color:tradeable()?'#059669':'#dc2626',lineHeight:'1.2',marginBottom:'3px'}},
    tradeable()?'✅ TRADE DAY':'🚫 STAND DOWN'));
  sc.appendChild(el('div',{style:{fontSize:'10px',color:'#64748b',fontWeight:'600',lineHeight:'1.4'}},
    hasRisk()?te[0]?.e:vixHigh()?'VIX too high':'Watch for >5% move'));
  top.appendChild(sc);
  w.appendChild(top);

  // Loading placeholder
  if(S.loading&&Object.keys(S.marketData).length===0){
    const lc=el('div',{cls:'card',style:{textAlign:'center',padding:'40px 0',
      color:'#64748b',fontWeight:'600',fontSize:'13px'}});
    lc.appendChild(el('span',{cls:'spin spin-blue'}));
    lc.appendChild(document.createTextNode('Fetching live data…'));
    w.appendChild(lc);
  } else {
    S.tickers.forEach(ticker=>{
      const d=S.marketData[ticker];
      const tcol=getColor(ticker);
      if(!d){
        const nc=el('div',{cls:'card',style:{borderLeft:'4px solid '+tcol}});
        nc.appendChild(el('div',{style:{color:'#94a3b8',fontSize:'12px'}},ticker+' — awaiting data'));
        w.appendChild(nc); return;
      }
      const s=sig(d.chg);
      const chg=parseFloat(d.chg);
      const pct=Math.min(Math.abs(chg)/MOVE_PCT*100,100);
      const active=s.type==='SELL_CALL'||s.type==='SELL_PUT';
      const price=parseFloat(d.price);
      const expiry=nextExpiry(30), dte=daysUntil(expiry);
      const callStrike=strikePx(price,10), putStrike=strikePx(price,-10);
      const opts=estimateOptions(price,callStrike,putStrike,dte,d.iv);
      const rvNum=d.iv?parseFloat(d.iv):null;
      const dec=S.decisions[ticker];
      const hasTrade=S.trades.some(t=>t.ticker===ticker&&t.status==='open');

      // RV pill helper
      function rvPill(forEntry){
        if(d.ivLoading) return el('div',{style:{display:'inline-flex',alignItems:'center',gap:'4px',
          background:'#f1f5f9',border:'1.5px solid #e2e8f0',borderRadius:'6px',
          padding:'3px 8px',fontSize:'10px',fontWeight:'700',color:'#94a3b8'}},
          el('span',{cls:'spin spin-blue',style:{width:'9px',height:'9px',marginRight:'2px'}}),'RV…');
        if(rvNum===null) return el('div',{style:{display:'inline-flex',alignItems:'center',
          background:'#f1f5f9',border:'1.5px solid #e2e8f0',borderRadius:'6px',
          padding:'3px 8px',fontSize:'10px',fontWeight:'700',color:'#94a3b8'}},'RV N/A');
        let bg,border,color,icon,label;
        if(forEntry){
          if(rvNum>=100){bg='#d1fae5';border='#10b981';color='#065f46';icon='🟢';label='RV '+rvNum+'% — ENTER';}
          else{bg='#f1f5f9';border='#cbd5e1';color='#64748b';icon='⚪';label='RV '+rvNum+'% — WAIT';}
        }else{
          if(rvNum<100){bg='#d1fae5';border='#10b981';color='#065f46';icon='🟢';label='RV '+rvNum+'% — CLOSE';}
          else{bg='#f1f5f9';border='#cbd5e1';color='#64748b';icon='⚪';label='RV '+rvNum+'% — HOLD';}
        }
        return el('div',{style:{display:'inline-flex',alignItems:'center',gap:'4px',
          background:bg,border:'1.5px solid '+border,borderRadius:'6px',
          padding:'3px 8px',fontSize:'10px',fontWeight:'800',color}},icon+' '+label);
      }

      const tc=el('div',{cls:'card',style:{borderLeft:'4px solid '+tcol,
        boxShadow:active?'0 2px 16px '+tcol+'22,0 1px 4px rgba(0,0,0,.07)':undefined}});

      // Title row
      const r1=el('div',{style:{display:'flex',justifyContent:'space-between',
        alignItems:'center',marginBottom:'11px'}});
      r1.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'9px'}},
        el('span',{style:{fontSize:'18px',fontWeight:'800',color:tcol}},ticker),
        el('span',{cls:'badge '+s.cls},s.label),
        hasTrade?el('span',{cls:'badge badge-tracking'},'TRACKING'):''
      ));
      r1.appendChild(el('button',{style:{background:tcol+'15',border:'1.5px solid '+tcol+'40',
        color:tcol,padding:'5px 10px',borderRadius:'7px',fontSize:'10px',fontWeight:'700',
        cursor:'pointer',fontFamily:'inherit'},onClick:()=>loadChart(ticker)},'📈'));
      tc.appendChild(r1);

      // Stats
      const grid=el('div',{cls:'stat-grid'});
      [['Price','$'+d.price,'#1a2332'],
       ['Day Chg',(chg>=0?'+':'')+d.chg+'%',chg>=0?'#059669':'#dc2626'],
       ['Prev','$'+d.prev,'#64748b']
      ].forEach(([l,v,c])=>{
        const sb=el('div',{cls:'stat-box'});
        sb.appendChild(el('div',{cls:'stat-lbl'},l));
        sb.appendChild(el('div',{cls:'stat-val',style:{color:c}},v));
        grid.appendChild(sb);
      });
      tc.appendChild(grid);

      // Options boxes
      const obg=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',
        gap:'8px',marginBottom:'10px'}});
      // CALL box
      const cb=el('div',{style:{background:s.callOk?'#fef3c7':'#f8faff',
        border:'1.5px solid '+(s.callOk?'#f59e0b':'#e2e8f0'),borderRadius:'9px',padding:'10px'}});
      cb.appendChild(el('div',{style:{fontSize:'9px',fontWeight:'800',marginBottom:'4px',
        color:s.callOk?'#92400e':'#94a3b8',letterSpacing:'.08em'}},'SELL CALL'));
      cb.appendChild(el('div',{style:{fontSize:'14px',fontWeight:'800',color:'#1a2332',marginBottom:'2px'}},
        '$'+callStrike.toFixed(2)));
      cb.appendChild(el('div',{style:{fontSize:'10px',color:'#64748b',fontWeight:'600',marginBottom:'4px'}},
        'Exp: '+fmtDate(expiry)+' ('+dte+'d)'));
      cb.appendChild(el('div',{style:{fontSize:'10px',fontWeight:'700',color:'#059669',marginBottom:'2px'}},
        'Bid $'+opts.callBid+' / Ask $'+opts.callAsk));
      cb.appendChild(el('div',{style:{fontSize:'10px',color:'#64748b',fontWeight:'600',marginBottom:'6px'}},
        'Mid $'+opts.callMid+' (~'+opts.callPct+'%)'));
      cb.appendChild(rvPill(true));
      obg.appendChild(cb);
      // PUT box
      const pb=el('div',{style:{background:s.putOk?'#d1fae5':'#f8faff',
        border:'1.5px solid '+(s.putOk?'#10b981':'#e2e8f0'),borderRadius:'9px',padding:'10px'}});
      pb.appendChild(el('div',{style:{fontSize:'9px',fontWeight:'800',marginBottom:'4px',
        color:s.putOk?'#065f46':'#94a3b8',letterSpacing:'.08em'}},'SELL PUT'));
      pb.appendChild(el('div',{style:{fontSize:'14px',fontWeight:'800',color:'#1a2332',marginBottom:'2px'}},
        '$'+putStrike.toFixed(2)));
      pb.appendChild(el('div',{style:{fontSize:'10px',color:'#64748b',fontWeight:'600',marginBottom:'4px'}},
        'Exp: '+fmtDate(expiry)+' ('+dte+'d)'));
      pb.appendChild(el('div',{style:{fontSize:'10px',fontWeight:'700',color:'#059669',marginBottom:'2px'}},
        'Bid $'+opts.putBid+' / Ask $'+opts.putAsk));
      pb.appendChild(el('div',{style:{fontSize:'10px',color:'#64748b',fontWeight:'600',marginBottom:'6px'}},
        'Mid $'+opts.putMid+' (~'+opts.putPct+'%)'));
      pb.appendChild(rvPill(true));
      obg.appendChild(pb);
      tc.appendChild(obg);

      // Trade radio buttons
      if(active&&!hasTrade){
        tc.appendChild(el('div',{style:{fontSize:'10px',fontWeight:'800',color:'#475569',
          marginBottom:'5px',letterSpacing:'.06em'}},'DID YOU TAKE THIS TRADE?'));
        const rr=el('div',{cls:'radio-row'});
        if(s.callOk) rr.appendChild(el('button',{
          cls:'radio-btn'+(dec==='call'?' sel-call':''),
          onClick:()=>set({decisions:{...S.decisions,[ticker]:'call'}})
        },'✅ Sell Call'));
        if(s.putOk) rr.appendChild(el('button',{
          cls:'radio-btn'+(dec==='put'?' sel-put':''),
          onClick:()=>set({decisions:{...S.decisions,[ticker]:'put'}})
        },'✅ Sell Put'));
        rr.appendChild(el('button',{
          cls:'radio-btn'+(dec==='skip'?' sel-skip':''),
          onClick:()=>set({decisions:{...S.decisions,[ticker]:'skip'}})
        },'⏭ Skip'));
        tc.appendChild(rr);
        if(dec&&dec!=='skip'){
          tc.appendChild(el('button',{style:{width:'100%',marginTop:'8px',padding:'10px',
            background:'#1e40af',color:'#fff',border:'none',borderRadius:'8px',
            fontSize:'11px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'},
            onClick:()=>addTrade(ticker,dec)},
            'CONFIRM — Track '+ticker+' '+dec.toUpperCase()));
        }
      }

      // Open trade card
      if(hasTrade){
        const t=S.trades.find(x=>x.ticker===ticker&&x.status==='open');
        if(t){
          const pf=parseFloat(t.profitPct);
          const pfCol=pf>=50?'#059669':pf>=25?'#d97706':'#64748b';
          tc.appendChild(el('div',{style:{background:'#faf5ff',border:'1.5px solid #c4b5fd',
            borderRadius:'9px',padding:'10px',marginTop:'4px'}},
            el('div',{style:{display:'flex',justifyContent:'space-between',
              alignItems:'center',marginBottom:'8px'}},
              el('div',{style:{fontSize:'9px',fontWeight:'800',color:'#7c3aed',
                letterSpacing:'.08em'}},'TRACKING OPEN TRADE'),
              rvPill(false)
            ),
            el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',
              gap:'5px',fontSize:'11px',fontWeight:'600'}},
              el('div',{},el('span',{style:{color:'#64748b'}},'Type: '),el('b',{},t.type.toUpperCase())),
              el('div',{},el('span',{style:{color:'#64748b'}},'Strike: '),el('b',{style:{color:tcol}},'$'+t.strike)),
              el('div',{},el('span',{style:{color:'#64748b'}},'Entry: '),el('b',{},'$'+t.entryPremium)),
              el('div',{},el('span',{style:{color:'#64748b'}},'Current: '),el('b',{},'$'+t.currentPremium)),
              el('div',{},el('span',{style:{color:'#64748b'}},'P&L: '),el('b',{style:{color:pfCol}},pf.toFixed(1)+'%')),
              el('div',{},el('span',{style:{color:'#64748b'}},'Exp: '),el('b',{},t.expiry))
            ),
            pf>=50?el('div',{style:{marginTop:'8px',background:'#d1fae5',
              border:'1.5px solid #10b981',borderRadius:'7px',padding:'7px',
              fontSize:'11px',fontWeight:'800',color:'#065f46',textAlign:'center'}},
              '🎯 TARGET HIT — CLOSE THIS TRADE'):'',
            el('button',{style:{width:'100%',marginTop:'8px',padding:'8px',
              background:'#fee2e2',color:'#dc2626',border:'1.5px solid #fca5a5',
              borderRadius:'7px',fontSize:'10px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'},
              onClick:()=>closeTrade(t.id)},'Mark Closed / Exit Trade')
          ));
        }
      }

      // Signal progress bar
      tc.appendChild(el('div',{style:{marginTop:'10px'}},
        el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}},
          el('span',{style:{fontSize:'8px',fontWeight:'700',color:'#94a3b8',letterSpacing:'.06em'}},
            'SIGNAL THRESHOLD — '+Math.abs(chg).toFixed(1)+'% of '+MOVE_PCT+'%'),
          el('span',{style:{fontSize:'8px',fontWeight:'700',color:'#94a3b8'}},pct.toFixed(0)+'%')
        ),
        el('div',{cls:'pbar-track'},
          el('div',{cls:'pbar-fill',style:{width:pct+'%',background:pct>=100?tcol:'#cbd5e1'}}))
      ));
      tc.appendChild(el('div',{style:{display:'flex',gap:'12px',marginTop:'7px',
        fontSize:'10px',color:'#94a3b8',fontWeight:'600'}},
        el('span',{},'Vol: '+fmtVol(d.vol)),
        el('span',{},'H: $'+parseFloat(d.high||0).toFixed(2)),
        el('span',{},'L: $'+parseFloat(d.low||0).toFixed(2))
      ));
      w.appendChild(tc);
    });
  }

  // AI button
  const aiBtnTxt=S.aiLoading?'Generating…':!S.anthropicKey
    ?'🤖 Add Anthropic Key for AI Briefing':'⚡ Get AI Daily Briefing';
  const aiBtn=el('button',{cls:'btn-ai',onClick:loadAnalysis},
    S.aiLoading?el('span',{cls:'spin'}):'',aiBtnTxt);
  if(S.aiLoading||S.loading) aiBtn.disabled=true;
  w.appendChild(aiBtn);
  return w;
}

// SETTINGS TAB — Ticker management + API key reset

function renderSettings(){
  const w=el('div',{cls:'fade'});

  // ── Watched Tickers section ──────────────────────────────────
  const card=el('div',{cls:'card'});

    'Add any valid stock or ETF ticker. Prices, signals, and options data update for each ticker. '
    +'Removing a ticker stops new data fetches but ',
    el('b',{},'existing open trades keep tracking until closed or expired.'),
  ));

  // Current tickers as removable pills
  const pillRow=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'14px'}});
  S.tickers.forEach(sym=>{
    const col=getColor(sym);
    const pill=el('div',{style:{display:'inline-flex',alignItems:'center',gap:'6px',
      background:col+'15',border:'1.5px solid '+col+'50',borderRadius:'8px',
      padding:'8px 12px'}});
    pill.appendChild(el('span',{style:{fontSize:'13px',fontWeight:'800',color:col}},sym));
    pill.appendChild(el('button',{
      style:{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',
        fontSize:'18px',lineHeight:'1',padding:'0',display:'flex',alignItems:'center'},
      onClick:()=>removeTicker(sym),
      title:'Remove '+sym
    },'×'));
    pillRow.appendChild(pill);
  });
  card.appendChild(pillRow);

  // Add new ticker
  card.appendChild(el('div',{style:{fontSize:'10px',fontWeight:'800',color:'#475569',
    letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'7px'}},'Add Ticker'));
  const inputRow=el('div',{style:{display:'flex',gap:'8px',alignItems:'flex-start'}});
  const inp=el('input',{cls:'key-input',style:{flex:'1',marginBottom:'0',textTransform:'uppercase',

  const addBtn=el('button',{style:{padding:'12px 18px',background:'#1e40af',color:'#fff',

  if(S.tickerBusy) addBtn.disabled=true;
  inputRow.appendChild(inp);
  inputRow.appendChild(addBtn);
  card.appendChild(inputRow);

  if(S.tickerErr)
    card.appendChild(el('div',{style:{color:'#dc2626',fontSize:'11px',marginTop:'6px',fontWeight:'600'}},
      S.tickerErr));

  card.appendChild(el('div',{style:{fontSize:'9px',color:'#94a3b8',marginTop:'8px',lineHeight:'1.5'}},
    '✓ Ticker verified against Finnhub before adding\n'
    +'✓ Saved permanently in this browser\n'
    +'✓ Rate limit: ~'+(S.tickers.length+1)+' Finnhub calls per refresh — well under 60/min free limit'));
  w.appendChild(card);

  // ── Rate limit info ──────────────────────────────────────────
  w.appendChild(el('div',{cls:'card'},
    el('div',{cls:'card-label'},'API USAGE — FINNHUB FREE TIER'),
    el('div',{style:{fontSize:'11px',color:'#475569',lineHeight:'1.7'}},
      el('b',{},'Per refresh: '),S.tickers.length+' quote calls + 1 VIX call = '+(S.tickers.length+1)+' total\n',
      el('b',{},'Rate: '),'1.1s between calls → ~54/min max · Limit is 60/min\n',
      el('b',{},'Candles: '),'Fetched once per session via Yahoo Finance (no Finnhub quota)\n',
      el('b',{},'Auto-refresh: '),'Every 5 minutes · ',
      el('span',{style:{color:'#059669',fontWeight:'700'}},'✓ Safe for all ticker counts')
    )
  ));

  // ── Reset keys ───────────────────────────────────────────────
  w.appendChild(el('div',{cls:'card'},
    el('div',{cls:'card-label'},'API KEYS'),
    el('div',{style:{fontSize:'11px',color:'#475569',marginBottom:'10px'}},
      'Reset clears all keys, ticker list, and trade history from this device.'),
    el('button',{style:{padding:'10px 16px',background:'#fee2e2',color:'#dc2626',
      border:'1.5px solid #fca5a5',borderRadius:'8px',fontSize:'11px',fontWeight:'700',
      cursor:'pointer',fontFamily:'inherit'},onClick:resetKeys},'🔑 Reset All & Start Over')
  ));

  return w;
}

// ══════════════════════════════════════════════════════════════
// TRADES TAB
// ══════════════════════════════════════════════════════════════
function renderTrades(){
  const w=el('div',{cls:'fade'});
  const open=S.trades.filter(t=>t.status==='open'||t.status==='target_hit');
  const closed=S.trades.filter(t=>t.status==='closed'||t.status==='expired').slice(0,50);
  const wins=closed.filter(t=>parseFloat(t.finalPnl||t.profitPct||0)>=50);

  // Header row
  const hr=el('div',{style:{display:'flex',justifyContent:'space-between',
    alignItems:'center',marginBottom:'10px'}});
  hr.appendChild(el('div',{style:{fontSize:'11px',fontWeight:'700',color:'#475569'}},
    S.trades.length+' trades · '+wins.length+' wins · '
    +Math.round(wins.length/Math.max(closed.length,1)*100)+'% win rate'));
  hr.appendChild(el('button',{style:{padding:'8px 14px',background:'#1e40af',color:'#fff',
    border:'none',borderRadius:'8px',fontSize:'11px',fontWeight:'700',cursor:'pointer',
    fontFamily:'inherit'},onClick:exportTradeLog},'📄 Export PDF'));
  w.appendChild(hr);

  const targetHit=open.filter(t=>t.status==='target_hit');
  if(targetHit.length)
    w.appendChild(el('div',{cls:'alert-green',style:{fontWeight:'700'}},
      '🎯 '+targetHit.length+' trade(s) hit 50% profit target! Close them now.'));

  if(!open.length&&!closed.length){
    w.appendChild(el('div',{cls:'card',style:{textAlign:'center',padding:'44px'}},
      el('div',{style:{fontSize:'28px',marginBottom:'10px'}},'🔁'),
      el('div',{style:{fontSize:'13px',color:'#94a3b8',fontWeight:'600'}},
        'No trades yet.\nWhen a signal fires on the Dashboard,\nuse the radio buttons to log your trade.')));
    return w;
  }

  // Open trades
  if(open.length){
    w.appendChild(el('div',{cls:'card-label',style:{marginBottom:'8px',fontSize:'11px',
      color:'#1e40af'}},'OPEN POSITIONS — '+open.length));
    open.forEach(t=>{
      const pf=parseFloat(t.profitPct);
      const pfCol=pf>=50?'#059669':pf>=25?'#d97706':'#dc2626';
      const tcol=getColor(t.ticker);
      const daysLeft=daysUntil(new Date(t.expiryDate));
      const tc=el('div',{cls:'track-card'});
      tc.appendChild(el('div',{cls:'track-header'},
        el('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          el('span',{style:{fontSize:'16px',fontWeight:'800',color:tcol}},t.ticker),
          el('span',{cls:'badge '+(t.type==='call'?'badge-call':'badge-put')},t.type.toUpperCase()),
          t.status==='target_hit'?el('span',{cls:'badge',style:{background:'#d1fae5',
            color:'#065f46',border:'1.5px solid #10b981'}},'🎯 50% HIT'):''
        ),
        el('div',{style:{textAlign:'right'}},
          el('div',{style:{fontSize:'18px',fontWeight:'800',color:pfCol}},(pf>=0?'+':'')+pf+'%'),
          el('div',{style:{fontSize:'10px',color:'#64748b',fontWeight:'600'}},daysLeft+'d left')
        )
      ));
      // RV pill
      const rv=S.marketData[t.ticker]?.iv?parseFloat(S.marketData[t.ticker].iv):null;
      if(rv!==null){
        const isClose=rv<100;
        tc.appendChild(el('div',{style:{display:'inline-flex',alignItems:'center',gap:'4px',
          background:isClose?'#d1fae5':'#f1f5f9',
          border:'1.5px solid '+(isClose?'#10b981':'#cbd5e1'),
          borderRadius:'6px',padding:'4px 10px',fontSize:'10px',fontWeight:'800',
          color:isClose?'#065f46':'#64748b',marginBottom:'10px'}},
          (isClose?'🟢':'⚪')+' RV '+rv+'% — '+(isClose?'GOOD TO CLOSE':'HOLD POSITION')));
      }
      tc.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',
        gap:'6px',marginBottom:'10px',fontSize:'11px',fontWeight:'600'}},
        el('div',{},el('span',{style:{color:'#64748b'}},'Strike: '),el('b',{},'$'+t.strike)),
        el('div',{},el('span',{style:{color:'#64748b'}},'Expiry: '),el('b',{},t.expiry)),
        el('div',{},el('span',{style:{color:'#64748b'}},'Entry prem: '),el('b',{},'$'+t.entryPremium)),
        el('div',{},el('span',{style:{color:'#64748b'}},'Current: '),el('b',{},'$'+t.currentPremium)),
        el('div',{},el('span',{style:{color:'#64748b'}},'Bid/Ask: '),el('b',{},'$'+t.currentBid+' / $'+t.currentAsk)),
        el('div',{},el('span',{style:{color:'#64748b'}},'Entered: '),el('b',{},t.entryDate))
      ));
      tc.appendChild(el('div',{style:{marginBottom:'10px'}},
        el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}},
          el('span',{style:{fontSize:'9px',fontWeight:'800',color:'#64748b',letterSpacing:'.06em'}},'PROFIT PROGRESS — TARGET: 50%'),
          el('span',{style:{fontSize:'9px',fontWeight:'800',color:pfCol}},pf+'%')
        ),
        el('div',{cls:'pbar-track',style:{height:'8px'}},
          el('div',{cls:'pbar-fill',style:{width:Math.max(0,Math.min(pf,100))+'%',
            background:pf>=50?'linear-gradient(90deg,#059669,#10b981)':pf>=25?'#d97706':'#1e40af'}}))
      ));
      tc.appendChild(el('button',{style:{width:'100%',padding:'9px',background:'#fff',
        color:'#dc2626',border:'1.5px solid #fca5a5',borderRadius:'8px',fontSize:'11px',
        fontWeight:'700',cursor:'pointer',fontFamily:'inherit'},
        onClick:()=>closeTrade(t.id)},'Mark Closed / Exit Trade'));
      w.appendChild(tc);
    });
  }

  // Closed trades
  if(closed.length){
    w.appendChild(el('div',{cls:'card-label',style:{margin:'16px 0 8px',fontSize:'11px',color:'#94a3b8'}},'CLOSED'));
    closed.forEach(t=>{
      const pf=parseFloat(t.finalPnl||t.profitPct||0);
      w.appendChild(el('div',{cls:'card',style:{opacity:'.85'}},
        el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
          el('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
            el('span',{style:{fontWeight:'800',color:getColor(t.ticker)}},t.ticker),
            el('span',{cls:'badge '+(t.type==='call'?'badge-call':'badge-put')},t.type.toUpperCase())
          ),

            el('div',{style:{fontWeight:'800',fontSize:'13px',color:pf>=50?'#059669':'#dc2626'}},

            el('div',{style:{fontSize:'10px',color:'#94a3b8',fontWeight:'600'}},
              (t.daysActive?t.daysActive+'d · ':'')+(t.closedDate||'Closed'))
          )
        )
      ));
    });
  }
  return w;
}

function renderChart(){
  const w=el('div',{cls:'fade'});
  const ticker=S.chartTicker||S.tickers[0];
  const tcol=getColor(ticker);

  // Ticker selector
  const row=el('div',{style:{display:'flex',gap:'8px',marginBottom:'14px',flexWrap:'wrap'}});
  S.tickers.forEach(t=>{
    const tc=getColor(t);
    row.appendChild(el('button',{style:{padding:'9px 18px',borderRadius:'8px',fontSize:'12px',
      fontWeight:'800',border:'2px solid '+(t===ticker?tc:'#e2e8f0'),
      background:t===ticker?tc:'#fff',color:t===ticker?'#fff':'#64748b',
      cursor:'pointer',fontFamily:'inherit'},onClick:()=>loadChart(t)},t));
  });
  w.appendChild(row);

  if(S.chartLoading){
    const lc=el('div',{cls:'card',style:{textAlign:'center',padding:'48px 0',color:'#64748b',fontWeight:'600'}});
    lc.appendChild(el('span',{cls:'spin spin-blue'}));
    lc.appendChild(document.createTextNode('Loading chart data…'));
    w.appendChild(lc); return w;
  }
  if(S.chartError){w.appendChild(el('div',{cls:'alert-red'},S.chartError));return w;}

  const candles=S.chartData[ticker];
  if(!candles||!candles.length){
    w.appendChild(el('div',{cls:'card',style:{textAlign:'center',padding:'44px'}},
      el('div',{style:{fontSize:'28px',marginBottom:'10px'}},'📈'),
      el('div',{style:{fontSize:'13px',color:'#94a3b8',fontWeight:'600'}},
        'Select a ticker above to load chart')));
    return w;
  }

  const cur=candles[candles.length-1].c;
  const callS=(cur*1.10).toFixed(2), putS=(cur*0.90).toFixed(2);
  const chg30=((cur-candles[0].c)/candles[0].c*100).toFixed(1);
  const expiry=nextExpiry(30), dte=daysUntil(expiry);
  const rv=S.marketData[ticker]?.iv||null;
  const opts=estimateOptions(cur,parseFloat(callS),parseFloat(putS),dte,rv);

  // Summary
  w.appendChild(el('div',{cls:'card',style:{marginBottom:'10px'}},
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px'}},
      el('div',{},
        el('div',{style:{fontSize:'20px',fontWeight:'800',color:tcol}},ticker),
        el('div',{style:{fontSize:'11px',color:'#64748b',fontWeight:'600'}},'30-Day Candle Chart')
      ),
      el('div',{style:{textAlign:'right'}},
        el('div',{style:{fontSize:'22px',fontWeight:'800'}},'$'+cur.toFixed(2)),
        el('div',{style:{fontSize:'12px',fontWeight:'700',
              color:parseFloat(chg30)>=0?'#059669':'#dc2626'}},
          (parseFloat(chg30)>=0?'+':'')+chg30+'% (30d)  |  RV: '+(rv?rv+'%':'loading…'))
      )
    )
  ));

  // Canvas chart
  const chartCard=el('div',{cls:'card',style:{padding:'12px'}});
  const chartWrap=el('div',{style:{width:'100%',height:'260px',borderRadius:'8px',overflow:'hidden'}});
  chartCard.appendChild(chartWrap);
  w.appendChild(chartCard);

  // Mount chart after DOM layout
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const W=chartWrap.clientWidth||window.innerWidth-32||340, H=260;
    const cvs=document.createElement('canvas');
    cvs.width=W*2; cvs.height=H*2; cvs.style.width=W+'px'; cvs.style.height=H+'px';
    chartWrap.appendChild(cvs);
    drawChart(cvs,candles,parseFloat(callS),parseFloat(putS),tcol,W*2,H*2);
  }));

  // Options pricing
  w.appendChild(el('div',{cls:'card'},
    el('div',{style:{fontSize:'13px',fontWeight:'800',marginBottom:'10px'}},'📊 Options Pricing — 30DTE'),
    el('div',{style:{marginBottom:'10px',fontSize:'11px',color:'#475569',fontWeight:'600'}},
      'Expiry: ',el('b',{},fmtDate(expiry)),' (',dte,'d)  |  Strike: 10% OTM  |  RV: ',
      el('b',{},rv?rv+'%':'loading…')),
    el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
      el('div',{style:{background:'#fffbeb',border:'1.5px solid #f59e0b',borderRadius:'10px',padding:'12px'}},
        el('div',{style:{fontSize:'10px',fontWeight:'800',color:'#92400e',marginBottom:'5px'}},'SELL CALL'),
        el('div',{style:{fontSize:'17px',fontWeight:'800',color:'#78350f',marginBottom:'3px'}},'$'+callS),
        el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px',
              fontSize:'11px',fontWeight:'700',marginBottom:'6px'}},
          el('div',{},el('span',{style:{color:'#92400e'}},'Bid '),el('b',{},'$'+opts.callBid)),
          el('div',{},el('span',{style:{color:'#92400e'}},'Ask '),el('b',{},'$'+opts.callAsk)),
          el('div',{},el('span',{style:{color:'#92400e'}},'Mid '),el('b',{},'$'+opts.callMid)),
          el('div',{},el('span',{style:{color:'#92400e'}},'Yld '),el('b',{style:{color:'#059669'}},opts.callPct+'%'))
        ),
        el('div',{style:{background:'rgba(255,255,255,.6)',borderRadius:'6px',padding:'5px 7px',
              fontSize:'10px',fontWeight:'700',color:'#92400e'}},
          'Exit at $'+(opts.callMid/2).toFixed(2)+' → 50% profit')
      ),
      el('div',{style:{background:'#f0fdf4',border:'1.5px solid #10b981',borderRadius:'10px',padding:'12px'}},
        el('div',{style:{fontSize:'10px',fontWeight:'800',color:'#065f46',marginBottom:'5px'}},'SELL PUT'),
        el('div',{style:{fontSize:'17px',fontWeight:'800',color:'#064e3b',marginBottom:'3px'}},'$'+putS),
        el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px',
              fontSize:'11px',fontWeight:'700',marginBottom:'6px'}},
          el('div',{},el('span',{style:{color:'#065f46'}},'Bid '),el('b',{},'$'+opts.putBid)),
          el('div',{},el('span',{style:{color:'#065f46'}},'Ask '),el('b',{},'$'+opts.putAsk)),
          el('div',{},el('span',{style:{color:'#065f46'}},'Mid '),el('b',{},'$'+opts.putMid)),
          el('div',{},el('span',{style:{color:'#065f46'}},'Yld '),el('b',{style:{color:'#059669'}},opts.putPct+'%'))
        ),
        el('div',{style:{background:'rgba(255,255,255,.6)',borderRadius:'6px',padding:'5px 7px',
              fontSize:'10px',fontWeight:'700',color:'#065f46'}},
          'Exit at $'+(opts.putMid/2).toFixed(2)+' → 50% profit')
      )
    )
  ));

  // Range
  const highs=candles.map(c=>c.h), lows=candles.map(c=>c.l);
  const max30=Math.max(...highs), min30=Math.min(...lows);
  const ranPct=Math.max(0,Math.min(100,((cur-min30)/(max30-min30)*100))).toFixed(0);
  w.appendChild(el('div',{cls:'card'},
    el('div',{style:{fontSize:'13px',fontWeight:'800',marginBottom:'10px'}},'📏 30-Day Range'),
    el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'10px'}},
      ...([['30d High','$'+max30.toFixed(2),'#059669'],['30d Low','$'+min30.toFixed(2),'#dc2626'],
           ['Range Pos.',ranPct+'%',tcol]]).map(([l,v,c])=>
        el('div',{cls:'stat-box'},el('div',{cls:'stat-lbl'},l),el('div',{cls:'stat-val',style:{color:c}},v)))),
    el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'10px',
          fontWeight:'700',color:'#94a3b8',marginBottom:'4px'}},
      el('span',{},'$'+min30.toFixed(2)),
      el('span',{style:{color:tcol}},'$'+cur.toFixed(2)),
      el('span',{},'$'+max30.toFixed(2))),
    el('div',{cls:'pbar-track',style:{height:'8px'}},
      el('div',{cls:'pbar-fill',style:{width:ranPct+'%',background:'linear-gradient(90deg,#86efac,'+tcol+')'}}))
  ));
  return w;
}

// Canvas candlestick chart
function drawChart(canvas,candles,callStrike,putStrike,tcol,W,H){
  const ctx=canvas.getContext('2d');
  const pad={t:16,r:14,b:32,l:70};
  const n=candles.length;
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const allH=candles.map(c=>c.h).concat([callStrike]);
  const allL=candles.map(c=>c.l).concat([putStrike]);
  const mn=Math.min(...allL)*0.997, mx=Math.max(...allH)*1.003;
  const yP=v=>pad.t+cH*(1-(v-mn)/(mx-mn));
  const xC=i=>pad.l+(i+0.5)*(cW/n);
  const bW=Math.max(3,cW/n*0.6);
  ctx.clearRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='#e8edf4'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+cH*i/4;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='bold 18px system-ui'; ctx.textAlign='right';
    ctx.fillText('$'+(mx-(mx-mn)*i/4).toFixed(2),pad.l-6,y+5);
  }
  // Strike lines
  [[callStrike,'#f59e0b','Call $'+callStrike],[putStrike,'#10b981','Put $'+putStrike]].forEach(([s,col,lbl])=>{
    const y=yP(s);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.setLineDash([8,4]);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=col; ctx.font='bold 16px system-ui'; ctx.textAlign='left';
    ctx.fillText(lbl,pad.l+4,y-5);
  });
  // Candles
  candles.forEach((c,i)=>{
    const x=xC(i), isUp=c.c>=c.o, col=isUp?'#059669':'#dc2626';
    const yH=yP(c.h), yL=yP(c.l), yO=yP(c.o), yC=yP(c.c);
    const top=Math.min(yO,yC), bh=Math.max(2,Math.abs(yO-yC));
    ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x,yH); ctx.lineTo(x,top); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,top+bh); ctx.lineTo(x,yL); ctx.stroke();
    ctx.fillStyle=isUp?col:'#fff'; ctx.fillRect(x-bW/2,top,bW,bh);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(x-bW/2,top,bW,bh);
  });
  // X labels
  ctx.fillStyle='#94a3b8'; ctx.font='bold 16px system-ui'; ctx.textAlign='center';
  const step=Math.ceil(n/6);
  candles.forEach((c,i)=>{
    if(i%step===0){const dt=new Date(c.t); ctx.fillText((dt.getMonth()+1)+'/'+dt.getDate(),xC(i),H-8);}
  });
  // Current price dot
  const last=candles[n-1], lx=xC(n-1), ly=yP(last.c);
  ctx.beginPath(); ctx.arc(lx,ly,6,0,Math.PI*2);
  ctx.fillStyle=tcol; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
}

      marginBottom:'6px'}},'⛔ TODAY — NO NEW TRADES'));

  if(!S.history.length){
    w.appendChild(el('div',{cls:'card',style:{textAlign:'center',padding:'44px'}},
      el('div',{style:{fontSize:'26px',marginBottom:'10px'}},'📋'),
      el('div',{style:{fontSize:'13px',color:'#94a3b8',fontWeight:'600'}},'No signals logged yet.')));
    return w;
  }
  S.history.forEach(h=>{
    const hc=el('div',{cls:'card'});
    hc.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',
          marginBottom:'9px',fontSize:'12px',fontWeight:'600'}},
      el('span',{style:{color:'#475569'}},h.date+' '+h.time),
      el('span',{style:{color:'#94a3b8'}},'VIX: '+(h.vix||'N/A'))));
    const pills=el('div',{style:{display:'flex',gap:'7px',flexWrap:'wrap'}});
    h.signals.forEach(s=>{
      const cls=s.s==='SELL CALL'?'badge-call':s.s==='SELL PUT'?'badge-put':'badge-wait';
      pills.appendChild(el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},
        el('span',{style:{fontSize:'11px',fontWeight:'700',color:'#475569'}},s.ticker+' '),
        el('span',{cls:'badge '+cls},s.s),
        s.chg?el('span',{style:{fontSize:'10px',color:'#94a3b8',fontWeight:'600'}},'('+s.chg+'%)'):''));
    });
    hc.appendChild(pills);
    w.appendChild(hc);
  });
  return w;
}

// ══════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  const sy=window.scrollY||0;
  app.innerHTML='';
  app.appendChild(S.screen==='setup'?renderSetup():renderApp());
  if(sy>0) window.scrollTo(0,sy);
}
render();
if(S.screen==='app') loadMarket();
// Auto-refresh every 5 minutes — rate-limited queue handles spacing
setInterval(()=>{if(S.screen==='app'&&!_loading) loadMarket();},5*60*1000);
